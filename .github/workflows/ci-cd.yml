# MOSLA CI/CD Pipeline
name: MOSLA CI/CD

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'  # Triggers on tags like v0.4.0, v1.0.0
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allows manual triggering

jobs:
  # ---------- TEST JOB ----------
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build the project
        run: npm run build

      - name: 🧪 Run tests (if any)
        run: npm test
        continue-on-error: true  # Don't fail if no tests yet

      - name: 📊 Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: |
            test-results/
            coverage/
          if-no-files-found: ignore

  # ---------- LINT JOB ----------
  lint:
    name: ✨ Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Check for TypeScript errors
        run: npx tsc --noEmit

      - name: 💅 Check code style (future)
        run: |
          echo "✅ Code style check passed (placeholder)"
          # When you add a formatter, uncomment:
          # npm run fmt -- --check

  # ---------- BUILD JOB ----------
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build the project
        run: npm run build

      - name: 📦 Package the dist folder
        run: |
          mkdir -p dist-package
          cp -r dist dist-package/
          cp package.json README.md LICENSE dist-package/

      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mosla-build
          path: dist-package/

  # ---------- PUBLISH JOB (CD) ----------
  publish:
    name: 📦 Publish to npm
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build the project
        run: npm run build

      - name: 📤 Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ---------- CREATE RELEASE ----------
  release:
    name: 🚀 Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: mosla-build
          path: ./mosla-build

      - name: 🗜️ Create release archive
        run: |
          cd ./mosla-build
          zip -r ../mosla-v${{ github.ref_name }}.zip ./*
          cd ..

      - name: 📤 Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            mosla-v${{ github.ref_name }}.zip
          generate_release_notes: true
          draft: false
          prerelease: false
